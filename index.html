<html lang="zh-CN">

    <style>
:root {
  color-scheme: light;
  --paper: #f7f4ee;
  --ink: #1f2723;
  --muted: #6e756f;
  --line: #d8d0c3;
  --panel: #fffdf8;
  --green: #246b4f;
  --green-dark: #174735;
  --red: #9d3b34;
  --gold: #b98525;
  --shadow: 0 18px 48px rgba(50, 45, 35, 0.14);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
  background:
    linear-gradient(135deg, rgba(36, 107, 79, 0.12), transparent 36%),
    linear-gradient(315deg, rgba(185, 133, 37, 0.14), transparent 38%),
    var(--paper);
  color: var(--ink);
}

button,
input {
  font: inherit;
}

button {
  border: 1px solid var(--line);
  background: #fffaf0;
  color: var(--ink);
  min-height: 44px;
  border-radius: 8px;
  padding: 0 16px;
  cursor: pointer;
  transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
}

button:hover {
  transform: translateY(-1px);
  border-color: #a99c8b;
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.55;
  transform: none;
}

.app-shell {
  width: min(960px, calc(100% - 28px));
  margin: 0 auto;
  padding: 28px 0;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 20px;
  margin-bottom: 18px;
}

.kicker {
  margin: 0 0 6px;
  color: var(--green);
  font-size: 14px;
  font-weight: 700;
}

h1 {
  margin: 0;
  font-size: clamp(30px, 5vw, 54px);
  line-height: 1.05;
  letter-spacing: 0;
}

.counter {
  display: grid;
  place-items: center;
  min-width: 92px;
  min-height: 72px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 253, 248, 0.72);
}

.counter span {
  font-size: 26px;
  font-weight: 800;
}

.counter small {
  color: var(--muted);
}

.controls,
.quiz-panel,
.stats {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 253, 248, 0.88);
  box-shadow: var(--shadow);
}

.controls {
  display: grid;
  grid-template-columns: minmax(280px, 1fr) minmax(260px, 360px);
  gap: 14px;
  padding: 14px;
  margin-bottom: 14px;
}

.segmented {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.mode-btn.active {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}

.search-box {
  display: grid;
  grid-template-columns: auto 1fr;
  align-items: center;
  gap: 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fffaf0;
  padding: 0 12px;
  min-height: 44px;
}

.search-box span {
  color: var(--muted);
}

.search-box input {
  width: 100%;
  border: 0;
  outline: 0;
  background: transparent;
  color: var(--ink);
}

.quiz-panel {
  padding: 22px;
}

.quiz-meta {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  color: var(--muted);
  font-size: 14px;
  margin-bottom: 14px;
}

.prompt-card {
  display: grid;
  place-items: center;
  min-height: 230px;
  border: 1px solid #cbbca7;
  border-radius: 8px;
  background:
    linear-gradient(rgba(255, 250, 240, 0.92), rgba(255, 250, 240, 0.92)),
    repeating-linear-gradient(90deg, transparent 0, transparent 36px, rgba(36, 107, 79, 0.07) 37px);
  padding: 28px;
}

.prompt-text {
  margin: 0;
  max-width: 760px;
  font-size: clamp(30px, 6vw, 58px);
  line-height: 1.28;
  text-align: center;
  font-weight: 800;
  word-break: break-word;
}

.answer-box {
  margin-top: 14px;
  padding: 16px 18px;
  border-left: 5px solid var(--gold);
  border-radius: 8px;
  background: #fff7e6;
}

.answer-box.hidden {
  display: none;
}

.answer-label {
  margin: 0 0 8px;
  color: var(--gold);
  font-weight: 800;
}

#answerText {
  margin: 0;
  font-size: 20px;
  line-height: 1.7;
}

.actions,
.judge-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 14px;
}

.primary {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}

.primary:hover {
  background: var(--green-dark);
}

.judge.good {
  color: var(--green-dark);
  border-color: rgba(36, 107, 79, 0.45);
}

.judge.weak {
  color: var(--red);
  border-color: rgba(157, 59, 52, 0.45);
}

.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr) auto auto;
  gap: 10px;
  align-items: center;
  margin-top: 14px;
  padding: 14px;
}

.stats div {
  display: grid;
  gap: 2px;
  min-height: 54px;
  align-content: center;
  border-right: 1px solid var(--line);
}

.stats strong {
  font-size: 24px;
}

.stats span {
  color: var(--muted);
  font-size: 13px;
}

#reviewWeakBtn.active {
  background: var(--red);
  border-color: var(--red);
  color: #fff;
}

@media (max-width: 720px) {
  .topbar {
    align-items: stretch;
  }

  .controls,
  .stats {
    grid-template-columns: 1fr;
  }

  .counter {
    min-width: 76px;
  }

  .stats div {
    border-right: 0;
    border-bottom: 1px solid var(--line);
    padding-bottom: 8px;
  }

  .actions,
  .judge-row {
    grid-template-columns: 1fr;
  }
}


</style>
  </head>

    <main class="app-shell">
      <section class="topbar" aria-label="练习设置">
        <div>
          <p class="kicker">中药学 210-271 页</p>
          <h1>中药功效随机抽查</h1>
        </div>
        <div class="counter">
          <span id="totalCount">392</span>
          <small>条题目</small>
        </div>
      </section>

      <section class="controls" aria-label="抽查模式">
        <div class="segmented" role="tablist" aria-label="题型">
          <button class="mode-btn active" data-mode="name" type="button">看药名答功效</button>
          <button class="mode-btn" data-mode="effect" type="button">看功效答药名</button>
        </div>
        <label class="search-box">
          <span>范围</span>
          <input id="searchInput" type="search" placeholder="输入药名或功效关键词" autocomplete="off" />
        </label>
      </section>

      <section class="quiz-panel" aria-live="polite">
        <div class="quiz-meta">
          <span id="modeLabel">药名</span>
          <span id="poolCount">392 条可抽</span>
        </div>

        <div class="prompt-card">
          <p id="promptText" class="prompt-text">麻黄</p>
        </div>

        <div id="answerBox" class="answer-box hidden">
          <p class="answer-label">答案</p>
          <p id="answerText"></p>
        </div>

        <div class="actions">
          <button id="showAnswerBtn" class="primary" type="button">显示答案</button>
          <button id="nextBtn" type="button">下一题</button>
        </div>

        <div class="judge-row" aria-label="掌握情况">
          <button id="knownBtn" class="judge good" type="button">掌握</button>
          <button id="unknownBtn" class="judge weak" type="button">不熟</button>
        </div>
      </section>

      <section class="stats" aria-label="练习统计">
        <div>
          <strong id="seenCount">0</strong>
          <span>已抽查</span>
        </div>
        <div>
          <strong id="knownCount">0</strong>
          <span>掌握</span>
        </div>
        <div>
          <strong id="unknownCount">0</strong>
          <span>不熟</span>
        </div>
        <button id="reviewWeakBtn" type="button">只抽不熟</button>
        <button id="resetBtn" type="button">重置</button>
      </section>
    </main>

  unknownBtn: document.querySelector("#unknownBtn"),
  seenCount: document.querySelector("#seenCount"),
  knownCount: document.querySelector("#knownCount"),
  unknownCount: document.querySelector("#unknownCount"),
  searchInput: document.querySelector("#searchInput"),
  reviewWeakBtn: document.querySelector("#reviewWeakBtn"),
  resetBtn: document.querySelector("#resetBtn"),
  modeButtons: document.querySelectorAll(".mode-btn"),
};

function getFilteredPool() {
  const keyword = els.searchInput.value.trim();
  let pool = herbs;

  if (keyword) {
    pool = pool.filter((herb) => herb.name.includes(keyword) || herb.effect.includes(keyword));
  }

  if (state.weakOnly) {
    pool = pool.filter((herb) => state.weakNames.has(herb.name));
  }

  return pool;
}

function pickRandom(pool) {
  if (pool.length === 0) return null;

  const freshPool = pool.filter((herb) => !state.recentNames.includes(herb.name));
  const candidates = freshPool.length > 0 ? freshPool : pool;
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function setQuestion(herb) {
  state.current = herb;
  els.answerBox.classList.add("hidden");
  els.showAnswerBtn.disabled = false;
  els.knownBtn.disabled = !herb;
  els.unknownBtn.disabled = !herb;

  if (!herb) {
    els.promptText.textContent = state.weakOnly ? "还没有不熟的题目" : "没有匹配的题目";
    els.answerText.textContent = "";
    els.showAnswerBtn.disabled = true;
    updateCounts();
    return;
  }

  const askingName = state.mode === "name";
  els.modeLabel.textContent = askingName ? "药名" : "功效";
  els.promptText.textContent = askingName ? herb.name : herb.effect;
  els.answerText.textContent = askingName ? herb.effect : herb.name;

  state.recentNames.push(herb.name);
  if (state.recentNames.length > 24) state.recentNames.shift();

  updateCounts();
}

function nextQuestion() {
  setQuestion(pickRandom(getFilteredPool()));
}

function showAnswer() {
  if (!state.current) return;
  els.answerBox.classList.remove("hidden");
  els.showAnswerBtn.disabled = true;
}

function judge(isKnown) {
  if (!state.current) return;
  state.seen += 1;

  if (isKnown) {
    state.known += 1;
    state.weakNames.delete(state.current.name);
  } else {
    state.unknown += 1;
    state.weakNames.add(state.current.name);
  }

  localStorage.setItem("weakHerbs", JSON.stringify([...state.weakNames]));
  nextQuestion();
}

function updateCounts() {
  const pool = getFilteredPool();
  els.totalCount.textContent = herbs.length;
  els.poolCount.textContent = `${pool.length} 条可抽`;
  els.seenCount.textContent = state.seen;
  els.knownCount.textContent = state.known;
  els.unknownCount.textContent = state.unknown;
  els.reviewWeakBtn.textContent = state.weakOnly ? `不熟题 ${pool.length} 条` : `只抽不熟 ${state.weakNames.size}`;
  els.reviewWeakBtn.classList.toggle("active", state.weakOnly);
}

els.modeButtons.forEach((button) => {
  button.addEventListener("click", () => {
    state.mode = button.dataset.mode;
    els.modeButtons.forEach((item) => item.classList.toggle("active", item === button));
    nextQuestion();
  });
});

els.searchInput.addEventListener("input", nextQuestion);
els.showAnswerBtn.addEventListener("click", showAnswer);
els.nextBtn.addEventListener("click", nextQuestion);
els.knownBtn.addEventListener("click", () => judge(true));
els.unknownBtn.addEventListener("click", () => judge(false));
els.reviewWeakBtn.addEventListener("click", () => {
  state.weakOnly = !state.weakOnly;
  nextQuestion();
});
els.resetBtn.addEventListener("click", () => {
  state.seen = 0;
  state.known = 0;
  state.unknown = 0;
  state.weakOnly = false;
  state.weakNames.clear();
  state.recentNames = [];
  localStorage.removeItem("weakHerbs");
  els.searchInput.value = "";
  nextQuestion();
});

nextQuestion();

</script>
  </body>
</html>
