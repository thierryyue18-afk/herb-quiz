<body>
  <main class="site">
    <header class="masthead"><div><h1 class="brand">蕾蕾的学习网站</h1><p class="subtitle">中药功效、穴位定位，乱序抽背复习。</p></div><div class="top-actions"><button id="openQuote" type="button">打开鼓励浮窗</button></div></header>
    <section id="studyView" class="view active-view">
      <nav class="tabs"><button class="tab active" data-section="herbs" type="button">中药功效抽背</button><button class="tab" data-section="acupoints" type="button">穴位定位乱序抽背</button></nav>
      <section class="panel" aria-live="polite">
        <div class="toolbar"><div class="segmented"><button class="mode active" data-mode="forward" type="button">正向抽背</button><button class="mode" data-mode="reverse" type="button">反向抽背</button></div><label class="search"><span>筛选</span><input id="search" type="search" placeholder="输入中药、功效、穴位或定位关键词" autocomplete="off" /></label></div>
        <div class="meta"><span id="typeLabel">药名</span><span id="poolCount">0 条可抽</span></div>
        <div class="question-card"><p id="prompt" class="prompt"></p></div>
        <div id="answer" class="answer"><small>答案</small><p id="answerText"></p></div>
        <div class="actions"><button id="show" class="primary" type="button">显示答案</button><button id="next" type="button">下一题</button></div>
        <div class="judge"><button id="known" class="good" type="button">掌握</button><button id="weak" class="weak" type="button">不熟</button></div>
        <div class="stats"><div class="stat"><strong id="seenCount">0</strong><span>本轮已抽查</span></div><div class="stat"><strong id="knownCount">0</strong><span>掌握</span></div><div class="stat"><strong id="weakCount">0</strong><span>不熟</span></div></div>

    </section>
    <section id="historyView" class="view"><div class="view-head"><h2>最近七轮记录</h2><button id="clearHistory" class="danger" type="button">清空记录</button></div><div id="rounds" class="rounds"></div></section>
    <section id="exportView" class="view"><div class="view-head"><h2>选择要导出的轮次</h2></div><div id="exportOptions" class="export-options"></div></section>
  </main>

ber": 128, "text": "姐姐，小鼠会一直给你偏爱和陪伴，让你知道这段路从来不只是辛苦。"}, {"number": 129, "text": "蕾蕾，你终会穿过这段辛苦的日子，去见那个闪闪发光的自己。"}, {"number": 130, "text": "宝宝，不管结果哪天来，小狗都会一直陪着你，站在你这边。"}, {"number": 131, "text": "笑笑，你努力的每一天，都算数；你坚持的每一刻，都值得。"}, {"number": 132, "text": "姐姐，等你上岸那天，一定会觉得今天的一切坚持都特别有意义。"}, {"number": 133, "text": "蕾蕾，你只管勇敢追梦，小鼠饼会一直一直陪着你，陪你熬过考研，也陪你等来好消息。 愿你稳稳复习，慢慢发光，最后如愿上岸。 —— 一直陪着你的小狗 / 小鼠 / 小鼠饼"}]};</script>

function pool(){const k=els.search.value.trim();return dataset().filter(x=>!k||`${x.name} ${x.answer} ${x.group||""}`.includes(k))}
function pick(){const items=pool();if(!items.length)return null;const fresh=items.filter(x=>!state.recentNames.includes(x.id)),c=fresh.length?fresh:items;return c[Math.floor(Math.random()*c.length)]}
function setQuestion(item){state.current=item;els.answer.classList.remove("show");[els.show,els.known,els.weak].forEach(x=>x.disabled=!item);if(!item){els.prompt.textContent="没有匹配的题目";els.answerText.textContent="";update();return}const rev=state.mode==="reverse";els.typeLabel.textContent=rev?item.reverseLabel:item.label;els.prompt.textContent=rev?item.answer:item.name;els.answerText.textContent=rev?`${item.group?item.group+" · ":""}${item.name}`:item.answer;state.recentNames.push(item.id);if(state.recentNames.length>30)state.recentNames.shift();update()}
function answerStatus(isWeak){if(!state.current)return;state.roundItems.push({section:state.current.section,group:state.current.group||"",name:state.current.name,answer:state.current.answer,status:isWeak?"不熟":"掌握",isWeak,time:new Date().toLocaleTimeString("zh-CN",{hour12:false,hour:"2-digit",minute:"2-digit"})});save();setQuestion(pick())}
function counts(){return{seen:state.roundItems.length,known:state.roundItems.filter(x=>!x.isWeak).length,weak:state.roundItems.filter(x=>x.isWeak).length}}
function update(){const c=counts();els.poolCount.textContent=`${pool().length} 条可抽`;els.seen.textContent=c.seen;els.knownCount.textContent=c.known;els.weakCount.textContent=c.weak}
function finishRound(){if(!state.roundItems.length){alert("本轮还没有已标记的抽查内容。");return}const c=counts();state.rounds.unshift({id:Date.now(),time:new Date().toLocaleString("zh-CN",{hour12:false}),items:state.roundItems.slice(),known:c.known,weak:c.weak});state.rounds=state.rounds.slice(0,7);state.roundItems=[];state.recentNames=[];save();renderRounds();update();setQuestion(pick());alert("本轮已结束并保存到记录中。")}
function renderRounds(){if(!state.rounds.length){els.rounds.innerHTML='<div class="empty">还没有已结束的抽查记录。</div>';return}els.rounds.innerHTML=state.rounds.map((r,i)=>`<article class="round-card"><div class="round-summary"><div><h3>第 ${state.rounds.length-i} 轮 · ${escapeHtml(r.time)}</h3><p>共 ${r.items.length} 题，掌握 ${r.known}，不熟 ${r.weak}</p></div></div><div class="round-items">${r.items.map((x,n)=>`<div class="record ${x.isWeak?"weak-record":""}"><strong>${n+1}. ${escapeHtml(x.status)}：${escapeHtml(x.name)}</strong><p>${escapeHtml(x.answer)}</p>${x.group?`<p>${escapeHtml(x.group)}</p>`:""}</div>`).join("")}</div></article>`).join("")}
function renderExports(){const current=counts(),options=[];if(state.roundItems.length)options.push(`<article class="export-option"><div><h3>正在进行的本轮</h3><p>共 ${current.seen} 题，掌握 ${current.known}，不熟 ${current.weak}</p></div><button data-export-current type="button">导出 PDF</button></article>`);state.rounds.forEach((r,i)=>options.push(`<article class="export-option"><div><h3>历史第 ${state.rounds.length-i} 轮</h3><p>${escapeHtml(r.time)} · 共 ${r.items.length} 题，掌握 ${r.known}，不熟 ${r.weak}</p></div><button data-export-id="${r.id}" type="button">导出 PDF</button></article>`));els.exportOptions.innerHTML=options.join("")||'<div class="empty">还没有可导出的抽查记录。</div>'}
function wrapCanvasText(ctx,text,maxWidth){const lines=[];let line="";for(const char of String(text)){const next=line+char;if(ctx.measureText(next).width>maxWidth&&line){lines.push(line);line=char}else line=next}if(line)lines.push(line);return lines}
function newPdfPage(title,meta){const canvas=document.createElement("canvas");canvas.width=1240;canvas.height=1754;const ctx=canvas.getContext("2d");ctx.fillStyle="#fffdf8";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle="#202923";ctx.font='bold 42px "Microsoft YaHei","PingFang SC",sans-serif';ctx.fillText(title,76,82);ctx.fillStyle="#687169";ctx.font='24px "Microsoft YaHei","PingFang SC",sans-serif';ctx.fillText(meta,76,126);ctx.strokeStyle="#d7d0c4";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(76,150);ctx.lineTo(1164,150);ctx.stroke();return{canvas,ctx,y:188}}
function drawPdfPages(items,title,time){const stats={known:items.filter(x=>!x.isWeak).length,weak:items.filter(x=>x.isWeak).length},meta=`${time}　共 ${items.length} 题　掌握 ${stats.known}　不熟 ${stats.weak}`,pages=[];let page=newPdfPage(title,meta);pages.push(page);items.forEach((item,index)=>{page.ctx.font='24px "Microsoft YaHei","PingFang SC",sans-serif';const answerLines=wrapCanvasText(page.ctx,item.answer,1040),groupLines=item.group?wrapCanvasText(page.ctx,item.group,1040):[],height=50+answerLines.length*36+groupLines.length*34+22;if(page.y+height>1650){page=newPdfPage(title,meta);pages.push(page)}const color=item.isWeak?"#b3261e":"#202923";page.ctx.fillStyle=color;page.ctx.font=`bold 27px "Microsoft YaHei","PingFang SC",sans-serif`;page.ctx.fillText(`${index+1}. ${item.status}：${item.name}`,80,page.y);page.y+=43;page.ctx.font=`${item.isWeak?"bold ":""}24px "Microsoft YaHei","PingFang SC",sans-serif`;answerLines.forEach(line=>{page.ctx.fillText(line,80,page.y);page.y+=36});if(groupLines.length){page.ctx.fillStyle=item.isWeak?color:"#687169";page.ctx.font='22px "Microsoft YaHei","PingFang SC",sans-serif';groupLines.forEach(line=>{page.ctx.fillText(line,80,page.y);page.y+=34})}page.ctx.strokeStyle="#ddd6ca";page.ctx.lineWidth=1;page.ctx.beginPath();page.ctx.moveTo(80,page.y+8);page.ctx.lineTo(1160,page.y+8);page.ctx.stroke();page.y+=28});pages.forEach((p,i)=>{p.ctx.fillStyle="#777";p.ctx.font='20px sans-serif';p.ctx.textAlign="center";p.ctx.fillText(`${i+1} / ${pages.length}`,620,1715);p.ctx.textAlign="left"});return pages.map(p=>p.canvas)}
function canvasJpeg(canvas){return new Promise((resolve,reject)=>canvas.toBlob(blob=>blob?blob.arrayBuffer().then(resolve):reject(new Error("图片生成失败")),"image/jpeg",.92))}
function bytes(...parts){const length=parts.reduce((sum,p)=>sum+p.length,0),out=new Uint8Array(length);let offset=0;parts.forEach(p=>{out.set(p,offset);offset+=p.length});return out}
async function createPdfBlob(canvases){const enc=new TextEncoder(),images=await Promise.all(canvases.map(canvasJpeg)),count=images.length,objects=[],kids=[];for(let i=0;i<count;i++)kids.push(`${3+i*3} 0 R`);objects[1]=enc.encode(`1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n`);objects[2]=enc.encode(`2 0 obj\n<< /Type /Pages /Kids [${kids.join(" ")}] /Count ${count} >>\nendobj\n`);images.forEach((buffer,i)=>{const pageId=3+i*3,imageId=pageId+1,contentId=pageId+2,jpeg=new Uint8Array(buffer),stream=`q\n595.28 0 0 841.89 0 0 cm\n/Im0 Do\nQ\n`;objects[pageId]=enc.encode(`${pageId} 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595.28 841.89] /Resources << /XObject << /Im0 ${imageId} 0 R >> >> /Contents ${contentId} 0 R >>\nendobj\n`);objects[imageId]=bytes(enc.encode(`${imageId} 0 obj\n<< /Type /XObject /Subtype /Image /Width 1240 /Height 1754 /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpeg.length} >>\nstream\n`),jpeg,enc.encode(`\nendstream\nendobj\n`));objects[contentId]=enc.encode(`${contentId} 0 obj\n<< /Length ${stream.length} >>\nstream\n${stream}endstream\nendobj\n`)});const header=enc.encode("%PDF-1.4\n"),ordered=objects.slice(1),offsets=[0];let position=header.length;ordered.forEach(obj=>{offsets.push(position);position+=obj.length});const xrefAt=position;let xref=`xref\n0 ${objects.length}\n0000000000 65535 f \n`;for(let i=1;i<objects.length;i++)xref+=`${String(offsets[i]).padStart(10,"0")} 00000 n \n`;const tail=enc.encode(`${xref}trailer\n<< /Size ${objects.length} /Root 1 0 R >>\nstartxref\n${xrefAt}\n%%EOF`);return new Blob([bytes(header,...ordered,tail)],{type:"application/pdf"})}
async function downloadPdf(items,title,time,fileName){const blob=await createPdfBlob(drawPdfPages(items,title,time)),url=URL.createObjectURL(blob),link=document.createElement("a");link.href=url;link.download=fileName;document.body.appendChild(link);link.click();link.remove();setTimeout(()=>URL.revokeObjectURL(url),30000)}
async function exportRound(){if(!state.roundItems.length){alert("本轮还没有可导出的抽查记录。请先完成题目并标记掌握或不熟。");return}await downloadPdf(state.roundItems,"蕾蕾的学习网站 · 本轮抽查记录",new Date().toLocaleString("zh-CN",{hour12:false}),"蕾蕾-本轮抽查记录.pdf")}
async function exportSavedRound(id){const round=state.rounds.find(r=>String(r.id)===String(id));if(!round)return;await downloadPdf(round.items,"蕾蕾的学习网站 · 历史抽查记录",round.time,`蕾蕾-抽查记录-${round.time.replace(/[\\/: ]/g,"-")}.pdf`)}
function showView(name){$("#studyView").classList.toggle("active-view",name==="study");$("#historyView").classList.toggle("active-view",name==="history");$("#exportView").classList.toggle("active-view",name==="export");$$('.nav-btn[data-view]').forEach(b=>b.classList.toggle("active-nav",b.dataset.view===name));if(name==="history")renderRounds();if(name==="export")renderExports();window.scrollTo({top:0,behavior:"smooth"})}
$$('.tab').forEach(b=>b.addEventListener("click",()=>{state.section=b.dataset.section;$$('.tab').forEach(x=>x.classList.toggle("active",x===b));els.search.value="";setQuestion(pick())}));$$('.mode').forEach(b=>b.addEventListener("click",()=>{state.mode=b.dataset.mode;$$('.mode').forEach(x=>x.classList.toggle("active",x===b));setQuestion(pick())}));
els.search.addEventListener("input",()=>setQuestion(pick()));els.show.addEventListener("click",()=>{els.answer.classList.add("show");els.show.disabled=true});els.next.addEventListener("click",()=>setQuestion(pick()));els.known.addEventListener("click",()=>answerStatus(false));els.weak.addEventListener("click",()=>answerStatus(true));$("#endRound").addEventListener("click",finishRound);$$('.nav-btn[data-view]').forEach(b=>b.addEventListener("click",()=>showView(b.dataset.view)));els.exportOptions.addEventListener("click",async event=>{const button=event.target.closest("button");if(!button)return;button.disabled=true;const old=button.textContent;button.textContent="正在生成…";try{if(button.hasAttribute("data-export-current"))await exportRound();if(button.hasAttribute("data-export-id"))await exportSavedRound(button.dataset.exportId)}catch(error){alert("PDF 生成失败，请重试。") }finally{button.disabled=false;button.textContent=old}});
$("#clearHistory").addEventListener("click",()=>{if(confirm("确定清空最近七轮记录吗？")){state.rounds=[];save();renderRounds()}});
function setQuote(){els.quoteText.textContent=DATA.quotes[Math.floor(Math.random()*DATA.quotes.length)].text}$("#closeQuote").addEventListener("click",()=>{els.quoteBox.classList.add("hidden");localStorage.setItem("leilei-quotes-hidden","1")});$("#openQuote").addEventListener("click",()=>{els.quoteBox.classList.remove("hidden");localStorage.removeItem("leilei-quotes-hidden");setQuote()});
setQuestion(pick());renderRounds();setQuote();if(localStorage.getItem("leilei-quotes-hidden")==="1")els.quoteBox.classList.add("hidden");setInterval(()=>{if(!els.quoteBox.classList.contains("hidden"))setQuote()},30000);
  </script>
