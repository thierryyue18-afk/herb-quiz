脉/类别": "常用奇穴", "穴位": "牵正", "定位": "在面部，耳垂前0.5-1寸的压痛处"}, {"经脉/类别": "常用奇穴", "穴位": "金津", "定位": "在口腔内，舌下左侧为金津，系带的静脉上"}, {"经脉/类别": "常用奇穴", "穴位": "玉液", "定位": "在口腔内，舌下右侧为玉液，系带的静脉上"}, {"经脉/类别": "常用奇穴", "穴位": "定喘", "定位": "在脊柱区，横平第7颈椎棘突下，后正中线旁开0.5寸"}, {"经脉/类别": "常用奇穴", "穴位": "夹脊", "定位": "在脊柱区，第1胸椎至第5腰椎棘突下两侧，后正中线旁开0.5寸，一侧17穴"}, {"经脉/类别": "常用奇穴", "穴位": "胃脘下俞", "定位": "在脊柱区，横平第8胸椎棘突下，后正中线旁开1.5寸"}, {"经脉/类别": "常用奇穴", "穴位": "腰眼", "定位": "在腰区，横平第4腰椎棘突下，后正中线旁开约3.5寸凹陷中"}, {"经脉/类别": "常用奇穴", "穴位": "子宫", "定位": "在下腹部，脐中下4寸，前正中线旁开3寸"}, {"经脉/类别": "常用奇穴", "穴位": "十宣", "定位": "在手指，十指尖端，距指甲游离缘0.1寸（指寸），左右共10穴"}, {"经脉/类别": "常用奇穴", "穴位": "八邪", "定位": "在手背，第1-5指间，指蹼缘后方赤白肉际处，左右共8穴"}, {"经脉/类别": "常用奇穴", "穴位": "四缝", "定位": "在手指，第2-5指掌面的近侧指间关节横纹的中央，一手4穴"}, {"经脉/类别": "常用奇穴", "穴位": "二白", "定位": "在前臂前区，腕掌侧远端横纹上4寸，桡侧腕屈肌腱的两侧，一肢2穴"}, {"经脉/类别": "常用奇穴", "穴位": "腰痛点", "定位": "在手背，第2、3掌骨及第4、5掌骨之间，腕背侧远端横纹与掌指关节中点处，一手2穴"}, {"经脉/类别": "常用奇穴", "穴位": "外劳宫", "定位": "在手背，第2、3掌骨间，掌指关节后0.5寸（指寸）凹陷中"}, {"经脉/类别": "常用奇穴", "穴位": "膝眼", "定位": "在膝部，髌韧带内侧凹陷处的中央。屈膝，在髌韧带两侧凹陷处，在内侧的称为内膝眼，外侧为外膝眼（外膝眼即犊鼻，犊鼻为足阳明胃经穴）"}, {"经脉/类别": "常用奇穴", "穴位": "胆囊", "定位": "在小腿外侧，腓骨小头直下2寸"}, {"经脉/类别": "常用奇穴", "穴位": "阑尾", "定位": "在小腿外侧，髌韧带外侧凹陷下5寸，胫骨前嵴外一横指（中指）"}], "quotes": [{"number": 1, "text": "蕾蕾，你已经很棒了，今天也只需要比昨天再坚持一点点。"}, {"number": 2, "text": "宝宝，考研这条路虽然辛苦，但你不是一个人在走，小狗会一直陪着你。"}, {"number": 3, "text": "笑笑，累的时候就歇一会儿，但别怀疑自己，你真的可以。"}, {"number": 4, "text": "姐姐，你认真背书的样子，本身就在发光。"}, {"number": 5, "text": "蕾蕾，哪怕今天只记住一个知识点，也是在向上走。"}, {"number": 6, "text": "宝宝，中医考研拼的不只是记忆，更是你的耐心和韧劲，而你两样都有。"}, {"number": 7, "text": "笑笑，你现在吃过的苦，都会变成以后上岸时的底气。"}, {"number": 8, "text": "姐姐，别怕进度慢，慢一点也比停下来更厉害。"}, {"number": 9, "text": "蕾蕾，小鼠知道你最近很累，但我更知道你一定能熬过去。"}, {"number": 10, "text": "宝宝，你不是“要不要上岸”的人，你是“什么时候上岸”的人。"}, {"number": 11, "text": "笑笑，今天背不会的内容，明天再来一遍，你一定会记住的。"}, {"number": 12, "text": "姐姐，每一次咬牙坚持，都会在未来替你说话。"}, {"number": 13, "text": "蕾蕾，别焦虑别人的速度，你有你自己的节奏。"}, {"number": 14, "text": "宝宝，你翻过的每一页书，都会在考场上回到你身边。"}, {"number": 15, "text": "笑笑，小狗会陪你熬过每一个想放弃的瞬间。"}, {"number": 16, "text": "姐姐，你现在所有的努力，都是在给未来的自己铺路。"}, {"number": 17, "text": "蕾蕾，就算今天状态不好，也不代表你不行，只是你需要缓一缓。"}, {"number": 18, "text": "宝宝，你已经走了这么远，千万别小看自己的坚持。"}, {"number": 19, "text": "笑笑，你不是在硬撑，你是在认真奔向自己的梦想。"}, {"number": 20, "text": "姐姐，考研很难，但你也很厉害。"}, {"number": 21, "text": "蕾蕾，中药、方剂、诊断这些难关，都会被你一点点拿下。"}, {"number": 22, "text": "宝宝，小鼠饼相信你，像相信太阳会升起来一样坚定。"}, {"number": 23, "text": "笑笑，记不住的时候别急，多看几遍，你会越来越熟的。"}, {"number": 24, "text": "姐姐，你的认真和自律，迟早会换来一个好结果。"}, {"number": 25, "text": "蕾蕾，今天的你也许很疲惫，但明天的你会感谢今天没放弃的自己。"}, {"number": 26, "text": "宝宝，所有看起来不起波澜的日复一日，最后都会让你看到坚持的意义。"}, {"number": 27, "text": "笑笑，哪怕只是坐到书桌前半小时，也值得给自己一个夸奖。"}, {"number": 28, "text": "姐姐，你不是必须时刻完美，你只要一直往前就很好。"}, {"number": 29, "text": "蕾蕾，小狗想告诉你：你每努力一点，我都替你开心一点。"}, {"number": 30, "text": "宝宝，不要怕难题，它们只是来证明你会越来越强。"}, {"number": 31, "text": "笑笑，那些反复背诵的夜晚，都会成为你上岸的见证。"}, {"number": 32, "text": "姐姐，你现在的辛苦不是白费，它在偷偷积攒惊喜。"}, {"number": 33, "text": "蕾蕾，如果你觉得压力大，就抱抱自己，也让小鼠抱抱你。"}, {"number": 34, "text": "宝宝，你值得一个全力以赴后的好消息。"}, {"number": 35, "text": "笑笑，你不是差一点的人，你是会越来越接近目标的人。"}, {"number": 36, "text": "姐姐，复习路上最珍贵的不是毫不费力，而是咬牙不退。"}, {"number": 37, "text": "蕾蕾，背不下去的时候就想想，那个更好的你正在前面等你。"}, {"number": 38, "text": "宝宝，小狗会一直站在你这边，陪你走完这段最难的路。"}, {"number": 39, "text": "笑笑，别怕今天做得不够好，能继续做下去就已经很了不起。"}, {"number": 40, "text": "姐姐，你温柔又坚定的样子，真的很让人心动。"}, {"number": 41, "text": "蕾蕾，中医基础再厚一点，方剂再熟一点，你离上岸就更近一点。"}, {"number": 42, "text": "宝宝，每一次早起和熬夜，都会变成你通往录取通知的台阶。"}, {"number": 43, "text": "笑笑，你不用和所有人比较，你只需要比昨天更靠近目标。"}, {"number": 44, "text": "姐姐，小鼠知道你会累，所以我更想成为你可以依靠的人。"}, {"number": 45, "text": "蕾蕾，哪怕进步很小，只要不是原地踏步，就是值得骄傲的。"}, {"number": 46, "text": "宝宝，今天你读过的每一行字，都在帮你向梦想靠拢。"}, {"number": 47, "text": "笑笑，遇到瓶颈不是坏事，说明你正在往更高的地方走。"}, {"number": 48, "text": "姐姐，别怀疑自己，你真的比你想象中更强大。"}, {"number": 49, "text": "蕾蕾，你不是在一个人对抗考研，小狗始终在你身后。"}, {"number": 50, "text": "宝宝，所有熬过的崩溃，都会变成你未来的勋章。"}, {"number": 51, "text": "笑笑，当你觉得快撑不住的时候，再坚持一下，也许就是突破口。"}, {"number": 52, "text": "姐姐，努力从来不会立刻发光，但它一定会在关键时刻照亮你。"}, {"number": 53, "text": "蕾蕾，别因为一时学不会就难过，真正厉害的人都是反复练出来的。"}, {"number": 54, "text": "宝宝，小鼠饼最喜欢看你认真学习的样子，因为那说明你在为自己发力。"}, {"number": 55, "text": "笑笑，你的梦想配得上你现在所有的辛苦。"}, {"number": 56, "text": "姐姐，今天的你再累，也比轻易放弃的自己更值得骄傲。"}, {"number": 57, "text": "蕾蕾，生理、病理、内科、针灸，一科一科来，你一定啃得下来。"}, {"number": 58, "text": "宝宝，别担心路远，小狗会陪你一步一步走。"}, {"number": 59, "text": "笑笑，你认真投入的每一分钟，都会让未来的结果更漂亮。"}, {"number": 60, "text": "姐姐，就算偶尔情绪低落，也不影响你最后成为赢家。"}, {"number": 61, "text": "蕾蕾，焦虑很正常，但请你相信，实力会一点点把焦虑赶走。"}, {"number": 62, "text": "宝宝，你现在看似普通的一天，可能就是未来最怀念的奋斗时光。"}, {"number": 63, "text": "笑笑，书很厚，题很多，但你也很有恒心。"}, {"number": 64, "text": "姐姐，小鼠会陪你把“我害怕”慢慢变成“我可以”。"}, {"number": 65, "text": "蕾蕾，真的累了就休息，不要硬扛，休息好再继续也很厉害。"}, {"number": 66, "text": "宝宝，每当你想放弃的时候，就告诉自己：再坚持今天一天。"}, {"number": 67, "text": "笑笑，你一路坚持到现在，本身就说明你有上岸的能力。"}, {"number": 68, "text": "姐姐，今天的努力不是为了感动谁，而是为了成全你自己。"}, {"number": 69, "text": "蕾蕾，你一定会在某个瞬间突然发现，原来自己已经进步了这么多。"}, {"number": 70, "text": "宝宝，小狗不是只在你开心时陪你，难熬的时候我更不会走。"}, {"number": 71, "text": "笑笑，不会的题可以再学，乱掉的情绪也可以慢慢捋顺。"}, {"number": 72, "text": "姐姐，你在为未来拼命的样子，值得被温柔对待。"}, {"number": 73, "text": "蕾蕾，每一道背过的重点，都是你写给未来的一封回信。"}, {"number": 74, "text": "宝宝，别怕结果来得晚，只要它是你想要的，就值得等。"}, {"number": 75, "text": "笑笑，你可以脆弱，可以抱怨，但别忘了你也可以重新站起来。"}, {"number": 76, "text": "姐姐，小鼠饼会一直给你鼓劲，直到你亲手接住自己的好消息。"}, {"number": 77, "text": "蕾蕾，今天学得慢一点没关系，重要的是你没有停下。"}, {"number": 78, "text": "宝宝，你一定会感谢现在这个拼命努力的自己。"}, {"number": 79, "text": "笑笑，考研不是一场瞬间爆发，而是一场安静却坚定的长跑。"}, {"number": 80, "text": "姐姐，别怕夜晚太长，因为天亮一定会来。"}, {"number": 81, "text": "蕾蕾，中综再难，也难不过你想变优秀的决心。"}, {"number": 82, "text": "宝宝，小狗相信你会带着满身努力，走进理想院校的大门。"}, {"number": 83, "text": "笑笑，每一个“再背一遍”，都在拉近你和上岸的距离。"}, {"number": 84, "text": "姐姐，如果今天只能完成一点点，那就先完成一点点，也很好。"}, {"number": 85, "text": "蕾蕾，累的时候看看远方，也看看一直陪着你的小鼠。"}, {"number": 86, "text": "宝宝，别把自己逼得太紧，你已经很努力了，再稳一点会更好。"}, {"number": 87, "text": "笑笑，最怕的不是难，而是自己先认输，可你从来不是轻易认输的人。"}, {"number": 88, "text": "姐姐，你值得一个不辜负努力的结局。"}, {"number": 89, "text": "蕾蕾，知识点会越背越熟，心态也会越练越稳。"}, {"number": 90, "text": "宝宝，小鼠饼希望你记住：你不是孤军奋战，你有我。"}, {"number": 91, "text": "笑笑，哪怕有时候看不到进步，进步也依然在发生。"}, {"number": 92, "text": "姐姐，别担心现在的辛苦，它会在未来开出花来。"}, {"number": 93, "text": "蕾蕾，考研路上的每一次坚持，都会让你离梦想更近一步。"}, {"number": 94, "text": "宝宝，今天你为梦想吃的苦，明天都会变成骄傲。"}, {"number": 95, "text": "笑笑，你现在流的汗，都是以后说“我做到了”的底气。"}, {"number": 96, "text": "姐姐，小狗会一直陪你，把这段难走的路走成值得纪念的路。"}, {"number": 97, "text": "蕾蕾，不管今天复习得怎么样，明天都还有机会变得更好。"}, {"number": 98, "text": "宝宝，难过的时候就来找小鼠，我给你抱抱，也给你力量。"}, {"number": 99, "text": "笑笑，只要你不放弃，很多看似遥远的事都会慢慢靠近你。"}, {"number": 100, "text": "姐姐，你所有的自律和坚持，都不会被辜负。"}, {"number": 101, "text": "蕾蕾，考研不是要你立刻完美，而是要你一直不退缩。"}, {"number": 102, "text": "宝宝，小鼠饼相信你终会等到那句“恭喜你被录取了”。"}, {"number": 103, "text": "笑笑，现在的你也许会迷茫，但未来的你一定会感谢现在没逃跑的自己。"}, {"number": 104, "text": "姐姐，别因为短暂的低谷否定自己，你只是还在爬坡而已。"}, {"number": 105, "text": "蕾蕾，你背过的书、做过的题、熬过的夜，都会替你争一个好结果。"}, {"number": 106, "text": "宝宝，中医考研这条路上，你的坚持本身就很了不起。"}, {"number": 107, "text": "笑笑，你真的不用成为别人，你只要成为最闪闪发光的自己。"}, {"number": 108, "text": "姐姐，小狗会陪你走过低谷，也会陪你等来上岸的春天。"}, {"number": 109, "text": "蕾蕾，如果压力太大，就把它分成今天这一小步一小步去完成。"}, {"number": 110, "text": "宝宝，你认真复习的每一天，都在悄悄改写自己的未来。"}, {"number": 111, "text": "笑笑，不要害怕暂时的不会，因为会的人也都是从不会开始的。"}, {"number": 112, "text": "姐姐，小鼠一直觉得，你认真追梦的时候特别特别酷。"}, {"number": 113, "text": "蕾蕾，你的努力也许现在还没有回响，但命运已经在偷偷为你铺垫。"}, {"number": 114, "text": "宝宝，每一个安静学习的夜晚，都会在未来闪闪发亮。"}, {"number": 115, "text": "笑笑，考研会累，但你值得为自己拼一次。"}, {"number": 116, "text": "姐姐，愿你最后走出考场的时候，能对自己说一句“我尽力了，我不遗憾”。"}, {"number": 117, "text": "蕾蕾，小狗想做你复习路上的底气，提醒你再难也有人爱你、懂你、陪你。"}, {"number": 118, "text": "宝宝，你已经不是起点的你了，你现在比从前更强、更稳、更勇敢。"}, {"number": 119, "text": "笑笑，别怕别人走得快，你稳稳地走，也一样能到达终点。"}, {"number": 120, "text": "姐姐，小鼠饼会一直在，陪你熬到所有努力都有回音的那一天。"}, {"number": 121, "text": "蕾蕾，愿你背的每一味中药、每一首方歌，最后都变成考场上的从容。"}, {"number": 122, "text": "宝宝，你只管努力，剩下的交给时间和坚持。"}, {"number": 123, "text": "笑笑，就算今天有点想哭也没关系，擦干眼泪你还是那个很厉害的你。"}, {"number": 124, "text": "姐姐，你现在的每一分认真，都会在未来换来一分安心。"}, {"number": 125, "text": "蕾蕾，小狗想告诉你：你不是为了应付考试，你是在奔赴更好的自己。"}, {"number": 126, "text": "宝宝，成绩也许会有起伏，但你的能力和潜力从来不只是一张卷子能定义的。"}, {"number": 127, "text": "笑笑，你可以慢一点，但请别停下来，因为我知道你会到达。"}, {"num function newPdfPage(title,meta){const canvas=document.createElement("canvas");canvas.width=1240;canvas.height=1754;const ctx=canvas.getContext("2d");ctx.fillStyle="#fffdf8";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle="#202923";ctx.font='bold 42px "Microsoft YaHei","PingFang SC",sans-serif';ctx.fillText(title,76,82);ctx.fillStyle="#687169";ctx.font='24px "Microsoft YaHei","PingFang SC",sans-serif';ctx.fillText(meta,76,126);ctx.strokeStyle="#d7d0c4";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(76,150);ctx.lineTo(1164,150);ctx.stroke();return{canvas,ctx,y:188}}
function drawPdfPages(items,title,time){const stats={known:items.filter(x=>!x.isWeak).length,weak:items.filter(x=>x.isWeak).length},meta=`${time}　共 ${items.length} 题　掌握 ${stats.known}　不熟 ${stats.weak}`,pages=[];let page=newPdfPage(title,meta);pages.push(page);items.forEach((item,index)=>{page.ctx.font='24px "Microsoft YaHei","PingFang SC",sans-serif';const answerLines=wrapCanvasText(page.ctx,item.answer,1040),groupLines=item.group?wrapCanvasText(page.ctx,item.group,1040):[],height=50+answerLines.length*36+groupLines.length*34+22;if(page.y+height>1650){page=newPdfPage(title,meta);pages.push(page)}const color=item.isWeak?"#b3261e":"#202923";page.ctx.fillStyle=color;page.ctx.font=`bold 27px "Microsoft YaHei","PingFang SC",sans-serif`;page.ctx.fillText(`${index+1}. ${item.status}：${item.name}`,80,page.y);page.y+=43;page.ctx.font=`${item.isWeak?"bold ":""}24px "Microsoft YaHei","PingFang SC",sans-serif`;answerLines.forEach(line=>{page.ctx.fillText(line,80,page.y);page.y+=36});if(groupLines.length){page.ctx.fillStyle=item.isWeak?color:"#687169";page.ctx.font='22px "Microsoft YaHei","PingFang SC",sans-serif';groupLines.forEach(line=>{page.ctx.fillText(line,80,page.y);page.y+=34})}page.ctx.strokeStyle="#ddd6ca";page.ctx.lineWidth=1;page.ctx.beginPath();page.ctx.moveTo(80,page.y+8);page.ctx.lineTo(1160,page.y+8);page.ctx.stroke();page.y+=28});pages.forEach((p,i)=>{p.ctx.fillStyle="#777";p.ctx.font='20px sans-serif';p.ctx.textAlign="center";p.ctx.fillText(`${i+1} / ${pages.length}`,620,1715);p.ctx.textAlign="left"});return pages.map(p=>p.canvas)}
function canvasJpeg(canvas){return new Promise((resolve,reject)=>canvas.toBlob(blob=>blob?blob.arrayBuffer().then(resolve):reject(new Error("图片生成失败")),"image/jpeg",.92))}
function bytes(...parts){const length=parts.reduce((sum,p)=>sum+p.length,0),out=new Uint8Array(length);let offset=0;parts.forEach(p=>{out.set(p,offset);offset+=p.length});return out}
async function createPdfBlob(canvases){const enc=new TextEncoder(),images=await Promise.all(canvases.map(canvasJpeg)),count=images.length,objects=[],kids=[];for(let i=0;i<count;i++)kids.push(`${3+i*3} 0 R`);objects[1]=enc.encode(`1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n`);objects[2]=enc.encode(`2 0 obj\n<< /Type /Pages /Kids [${kids.join(" ")}] /Count ${count} >>\nendobj\n`);images.forEach((buffer,i)=>{const pageId=3+i*3,imageId=pageId+1,contentId=pageId+2,jpeg=new Uint8Array(buffer),stream=`q\n595.28 0 0 841.89 0 0 cm\n/Im0 Do\nQ\n`;objects[pageId]=enc.encode(`${pageId} 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595.28 841.89] /Resources << /XObject << /Im0 ${imageId} 0 R >> >> /Contents ${contentId} 0 R >>\nendobj\n`);objects[imageId]=bytes(enc.encode(`${imageId} 0 obj\n<< /Type /XObject /Subtype /Image /Width 1240 /Height 1754 /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpeg.length} >>\nstream\n`),jpeg,enc.encode(`\nendstream\nendobj\n`));objects[contentId]=enc.encode(`${contentId} 0 obj\n<< /Length ${stream.length} >>\nstream\n${stream}endstream\nendobj\n`)});const header=enc.encode("%PDF-1.4\n"),ordered=objects.slice(1),offsets=[0];let position=header.length;ordered.forEach(obj=>{offsets.push(position);position+=obj.length});const xrefAt=position;let xref=`xref\n0 ${objects.length}\n0000000000 65535 f \n`;for(let i=1;i<objects.length;i++)xref+=`${String(offsets[i]).padStart(10,"0")} 00000 n \n`;const tail=enc.encode(`${xref}trailer\n<< /Size ${objects.length} /Root 1 0 R >>\nstartxref\n${xrefAt}\n%%EOF`);return new Blob([bytes(header,...ordered,tail)],{type:"application/pdf"})}
async function downloadPdf(items,title,time,fileName){const blob=await createPdfBlob(drawPdfPages(items,title,time)),url=URL.createObjectURL(blob),link=document.createElement("a");link.href=url;link.download=fileName;document.body.appendChild(link);link.click();link.remove();setTimeout(()=>URL.revokeObjectURL(url),30000)}
async function exportRound(){if(!state.roundItems.length){alert("本轮还没有可导出的抽查记录。请先完成题目并标记掌握或不熟。");return}await downloadPdf(state.roundItems,"蕾蕾的学习网站 · 本轮抽查记录",new Date().toLocaleString("zh-CN",{hour12:false}),"蕾蕾-本轮抽查记录.pdf")}
async function exportSavedRound(id){const round=state.rounds.find(r=>String(r.id)===String(id));if(!round)return;await downloadPdf(round.items,"蕾蕾的学习网站 · 历史抽查记录",round.time,`蕾蕾-抽查记录-${round.time.replace(/[\\/: ]/g,"-")}.pdf`)}
function showView(name){$("#studyView").classList.toggle("active-view",name==="study");$("#historyView").classList.toggle("active-view",name==="history");$("#exportView").classList.toggle("active-view",name==="export");$$('.nav-btn[data-view]').forEach(b=>b.classList.toggle("active-nav",b.dataset.view===name));if(name==="history")renderRounds();if(name==="export")renderExports();window.scrollTo({top:0,behavior:"smooth"})}
$$('.tab').forEach(b=>b.addEventListener("click",()=>{state.section=b.dataset.section;$$('.tab').forEach(x=>x.classList.toggle("active",x===b));els.search.value="";setQuestion(pick())}));$$('.mode').forEach(b=>b.addEventListener("click",()=>{state.mode=b.dataset.mode;$$('.mode').forEach(x=>x.classList.toggle("active",x===b));setQuestion(pick())}));
els.search.addEventListener("input",()=>setQuestion(pick()));els.show.addEventListener("click",()=>{els.answer.classList.add("show");els.show.disabled=true});els.expandMedicines.addEventListener("click",()=>renderCurrentAnswer(true));els.next.addEventListener("click",()=>setQuestion(pick()));els.known.addEventListener("click",()=>answerStatus(false));els.weak.addEventListener("click",()=>answerStatus(true));$("#endRound").addEventListener("click",finishRound);$$('.nav-btn[data-view]').forEach(b=>b.addEventListener("click",()=>showView(b.dataset.view)));els.exportOptions.addEventListener("click",async event=>{const button=event.target.closest("button");if(!button)return;button.disabled=true;const old=button.textContent;button.textContent="正在生成…";try{if(button.hasAttribute("data-export-current"))await exportRound();if(button.hasAttribute("data-export-id"))await exportSavedRound(button.dataset.exportId)}catch(error){alert("PDF 生成失败，请重试。") }finally{button.disabled=false;button.textContent=old}});
$("#clearHistory").addEventListener("click",()=>{if(confirm("确定清空最近七轮记录吗？")){state.rounds=[];save();renderRounds()}});
function setQuote(){els.quoteText.textContent=DATA.quotes[Math.floor(Math.random()*DATA.quotes.length)].text}$("#closeQuote").addEventListener("click",()=>{els.quoteBox.classList.add("hidden");localStorage.setItem("leilei-quotes-hidden","1")});$("#openQuote").addEventListener("click",()=>{els.quoteBox.classList.remove("hidden");localStorage.removeItem("leilei-quotes-hidden");setQuote()});
setQuestion(pick());renderRounds();setQuote();if(localStorage.getItem("leilei-quotes-hidden")==="1")els.quoteBox.classList.add("hidden");setInterval(()=>{if(!els.quoteBox.classList.contains("hidden"))setQuote()},30000);
